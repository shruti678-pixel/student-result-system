<!DOCTYPE html>
<html>
<head>
    <title>Student Result System</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #9face6);
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 100px auto;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }
        input, button {
            margin: 10px;
            padding: 10px;
            width: 90%;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 Student Result System</h2>
    
    <input type="text" id="name" placeholder="Enter Name">
    <input type="number" id="marks" placeholder="Enter Marks (0-100)">

    <button onclick="checkResult()">Check Result</button>

    <div id="result"></div>
</div>

<script>
function checkResult() {
    let name = document.getElementById("name").value;
    let marks = document.getElementById("marks").value;
    let result = document.getElementById("result");

    if (name === "" || marks === "" || marks < 0 || marks > 100) {
        result.innerHTML = "❌ Please enter valid details!";
        result.style.color = "red";
        return;
    }

    let grade, color, message, status;

    if (marks >= 90) {
        grade = "A"; color = "green"; message = "Excellent!";
    }
    else if (marks >= 75) {
        grade = "B"; color = "blue"; message = "Good Job!";
    }
    else if (marks >= 50) {
        grade = "C"; color = "orange"; message = "Keep Improving!";
    }
    else {
        grade = "Fail"; color = "red"; message = "Work Hard!";
    }

    status = marks >= 50 ? "Pass ✅" : "Fail ❌";

    result.innerHTML = `
        Name: ${name} <br>
        Marks: ${marks} <br>
        Grade: <span style="color:${color}">${grade}</span> <br>
        Status: ${status} <br>
        ${message}
    `;
}
</script>

</body>
</html>
